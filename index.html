<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade São Vicente de Paulo</title>
    <style>
        :root {
            --vaticano: #FFD700;
            --sangue: #8B0000;
            --neve: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: var(--neve);
            /* Removemos o gradiente pesado para focar na leitura */
        }

        /* Topo Ajustado para Mobile */
        .topo-container {
            background: var(--sangue);
            padding: 20px 10px;
            border-bottom: 5px solid var(--vaticano);
        }

        .texto-destaque {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: var(--vaticano);
            text-transform: uppercase;
            margin: 10px 0;
        }

        .flex-santos {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            margin-top: 15px;
        }

        .bloco-santo {
            width: 45%;
            text-align: center;
        }

        .foto-topo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--vaticano);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .legenda {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.2;
        }

        /* Conteúdo Principal */
        .container {
            padding: 15px;
        }

        h2 {
            font-size: 28px;
            color: var(--vaticano);
            margin: 20px 0;
        }

        /* Cartões Gigantes para Fácil Leitura */
        .card {
            background: var(--neve);
            color: #000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-bottom: 8px solid var(--sangue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .titulo-card {
            font-size: 30px; /* Bem grande mesmo */
            color: var(--sangue);
            font-weight: 900;
            display: block;
            margin-bottom: 15px;
            text-decoration: underline var(--vaticano);
        }

        .horario { 
            font-size: 26px; 
            font-weight: bold; 
            display: block;
            margin: 10px 0;
        }

        .celebrante { 
            font-size: 20px; 
            color: #444; 
            font-style: italic;
            display: block;
        }

        hr { border: 1px solid #ddd; margin: 20px 0; }

        /* QR Code em destaque */
        .qr-section {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            margin: 30px 0 60px 0;
            display: inline-block;
        }

        .qr-section p { color: #000; font-weight: bold; font-size: 18px; }

    </style>
</head>
<body>

<div class="topo-container">
    <span class="texto-destaque">Paróquia & Comunidade</span>
    
    <div class="flex-santos">
        <div class="bloco-santo">
            <img src="maria.png.PNG" alt="Maria" class="foto-topo">
            <span class="legenda">Mãe da Esperança</span>
        </div>
        
        <div class="bloco-santo">
            <img src="vicente.png.PNG" alt="São Vicente" class="foto-topo">
            <span class="legenda">São Vicente de Paulo</span>
        </div>
    </div>
</div>

<div class="container">
    <h2>Betim - Alvorada</h2>

    <div class="card">
        <span class="titulo-card">HOJE</span>
        <span class="horario">19:30 — Missa</span>
        <span class="celebrante">Padre Vicente</span>
    </div>

    <div class="card">
        <span class="titulo-card">QUINTA-FEIRA</span>
        <span class="horario">18:00 — Adoração</span>
        <span class="celebrante">Diácono Ronaldo</span>
        <hr>
        <span class="horario">19:30 — Celebração</span>
    </div>

    <div class="qr-section">
        <p>Acesse o site:</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://ssvpalvorada.github.io/Comunidade/" alt="QR Code">
    </div>
</div>

</body>
</html>
