<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade São Vicente de Paulo</title>
    <style>
        :root {
            --vaticano: #FFD700;
            --sangue: #8B0000;
            --neve: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: var(--neve);
            text-align: center;
        }

        .topo-container {
            background: var(--sangue);
            padding: 20px 10px;
            border-bottom: 5px solid var(--vaticano);
        }

        .texto-destaque {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: var(--vaticano);
            text-transform: uppercase;
            margin: 10px 0;
        }

        .flex-santos {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            margin-top: 15px;
        }

        .bloco-santo {
            width: 45%;
            text-align: center;
        }

        .foto-topo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--vaticano);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .legenda {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.2;
        }

        .container {
            padding: 15px;
            max-width: 800px;
            margin: auto;
        }

        h2 {
            font-size: 28px;
            color: var(--vaticano);
            margin: 20px 0;
        }

        .card {
            background: var(--neve);
            color: #000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-bottom: 8px solid var(--sangue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .titulo-card {
            font-size: 30px;
            color: var(--sangue);
            font-weight: 900;
            display: block;
            margin-bottom: 15px;
            text-decoration: underline var(--vaticano);
        }

        .horario { 
            font-size: 26px; 
            font-weight: bold; 
            display: block;
            margin: 10px 0;
        }

        .celebrante { 
            font-size: 20px; 
            color: #444; 
            font-style: italic;
            display: block;
        }

        hr { border: 1px solid #ddd; margin: 20px 0; }

        /* Rodapé Personalizado */
        footer {
            margin: 40px 0 60px 0;
            padding: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
        }

        .direitos {
            font-size: 18px;
            color: var(--vaticano);
            margin-bottom: 10px;
            display: block;
        }

        .rogai {
            font-size: 22px;
            color: var(--neve);
            font-style: italic;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

<div class="topo-container">
    <span class="texto-destaque">Paróquia & Comunidade</span>
    
    <div class="flex-santos">
        <div class="bloco-santo">
            <img src="maria.png.PNG" alt="Maria" class="foto-topo">
            <span class="legenda">Maria Mãe da Esperança</span>
        </div>
        
        <div class="bloco-santo">
            <img src="vicente.png.PNG" alt="São Vicente" class="foto-topo">
            <span class="legenda">São Vicente de Paulo</span>
        </div>
    </div>
</div>

<div class="container">
    <h2>Betim - Alvorada</h2>

    <div class="card">
        <span class="titulo-card">PROXIMA CELEBRAÇÃO</span>
        <span class="horario">19:30 — Celebração</span>
        <span class="dia">12/03</span>
        <span class="celebrante">Diacono José Geraldo</span>
    </div>

    <div class="card">
        <span class="titulo-card">QUINTA-FEIRA</span>
        <span class="horario">18:00 — Adoração</span>
        <span class="celebrante">Diácono Ronaldo</span>
        <hr>
        <span class="horario">19:30 — Celebração</span>
    </div>

    <footer>
        <span class="direitos">© 2026 Comunidade São Vicente De Paulo Alvorada Betim</span>
        <span class="rogai">São Vicente Rogai Por Nós</span>
    </footer>
</div>

</body>
</html>
